name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./...

      - name: Generate Windows resources
        run: go generate ./cmd/check-with-virustotal

      - name: Build Windows binary
        run: go build -ldflags="-H windowsgui" -o check-with-virustotal.exe ./cmd/check-with-virustotal

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: check-with-virustotal.exe
          generate_release_notes: true
