name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./...

      - name: Generate Windows resources
        run: go generate ./cmd/check-with-virustotal

      - name: Build Windows binary
        run: go build -ldflags="-H windowsgui" -o check-with-virustotal.exe ./cmd/check-with-virustotal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: check-with-virustotal
          path: check-with-virustotal.exe
